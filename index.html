<!DOCTYPE html>
<html>
<head>
    <title>Logseq Bridge</title>
    <style>
        body { 
            background: #111; color: #eee; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
        }
        button { 
            padding: 15px 30px; font-size: 1.2rem; cursor: pointer; 
            background: #2d81ff; color: white; border: none; border-radius: 8px; 
        }
        button:hover { background: #1a66cc; }
    </style>
<script>
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);

        // 1. Grab all the "ingredients" from your URL
        const page = params.get('page') || 'TODAY';
        const content = params.get('content') || '';
        const append = params.get('append') || 'false'; // This is the new "top" priority

        // 2. The "Search" Logic (skipping #CALLS to find the number)
        const match = content.match(/(?:#|%23)CALLS.*?(?:#|%23)(\d+)/is);
        const cleanNumber = match ? match[1] : "";

        // 3. Construct the "Command" for Logseq
        // Notice we added &append= here!
        const logseqURI = `logseq://x-callback-url/quickCapture?page=${encodeURIComponent(page)}&append=${append}&content=${encodeURIComponent(content)}`;
        
        // 4. Execute the "Jump" to Logseq
        window.location.href = logseqURI;

        // 5. Pivot to 1881
        setTimeout(() => {
            if (cleanNumber) {
                window.location.href = `https://www.1881.no/?query=${cleanNumber}`;
            } else {
                window.location.href = "https://www.1881.no";
            }
        }, 800);
    };
</script>
</head>
<body>
    <h2>Sent to Logseq!</h2>
    <p>If this tab didn't "self-destruct," hit the button:</p>
    <button onclick="window.close()">Close Tab</button>
</body>
</html>
